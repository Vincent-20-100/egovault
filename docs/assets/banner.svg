<svg xmlns="http://www.w3.org/2000/svg" width="900" height="280" viewBox="0 0 900 280">
  <defs>
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="1" fill="rgba(0,0,0,0.08)"/>
    </pattern>
    <filter id="key-outline" x="-20%" y="-20%" width="140%" height="140%">
      <feMorphology in="SourceGraphic" operator="dilate" radius="1" result="dilated"/>
      <feFlood flood-color="#0B4527" result="pine"/>
      <feComposite in="pine" in2="dilated" operator="in" result="outline"/>
      <feComposite in="SourceGraphic" in2="outline" operator="over"/>
    </filter>

    <g id="wordmark">
      <!-- E -->
      <rect x="0" y="0" width="5" height="1"/>
      <rect x="0" y="1" width="1" height="2"/>
      <rect x="0" y="3" width="4" height="1"/>
      <rect x="0" y="4" width="1" height="2"/>
      <rect x="0" y="6" width="5" height="1"/>
      <!-- G -->
      <rect x="7" y="0" width="4" height="1"/>
      <rect x="6" y="1" width="1" height="5"/>
      <rect x="8" y="3" width="3" height="1"/>
      <rect x="10" y="4" width="1" height="2"/>
      <rect x="7" y="6" width="3" height="1"/>
      <!-- O -->
      <rect x="13" y="0" width="3" height="1"/>
      <rect x="12" y="1" width="1" height="5"/>
      <rect x="16" y="1" width="1" height="5"/>
      <rect x="13" y="6" width="3" height="1"/>
      <!-- V -->
      <rect x="18" y="0" width="1" height="5"/>
      <rect x="22" y="0" width="1" height="5"/>
      <rect x="19" y="5" width="1" height="1"/>
      <rect x="21" y="5" width="1" height="1"/>
      <rect x="20" y="6" width="1" height="1"/>
      <!-- A -->
      <rect x="25" y="0" width="3" height="1"/>
      <rect x="24" y="1" width="1" height="6"/>
      <rect x="28" y="1" width="1" height="6"/>
      <rect x="25" y="3" width="3" height="1"/>
      <!-- U -->
      <rect x="30" y="0" width="1" height="6"/>
      <rect x="34" y="0" width="1" height="6"/>
      <rect x="31" y="6" width="3" height="1"/>
      <!-- L -->
      <rect x="36" y="0" width="1" height="7"/>
      <rect x="37" y="6" width="4" height="1"/>
      <!-- T -->
      <rect x="42" y="0" width="5" height="1"/>
      <rect x="44" y="1" width="1" height="6"/>
    </g>
  </defs>

  <rect width="900" height="280" rx="14" fill="#0B4527"/>

  <!-- Logo bust -->
  <svg x="40" y="70" width="140" height="140" viewBox="0 0 36 33" shape-rendering="crispEdges">
    <g fill="#8FE0A0">
      <rect x="13" y="2" width="6" height="1"/>
      <rect x="12" y="3" width="8" height="1"/>
      <rect x="11" y="4" width="10" height="1"/>
      <rect x="10" y="5" width="12" height="1"/>
      <rect x="9" y="6" width="14" height="8"/>
      <rect x="10" y="14" width="12" height="1"/>
      <rect x="11" y="15" width="10" height="1"/>
      <rect x="12" y="16" width="8" height="1"/>
      <rect x="13" y="17" width="6" height="1"/>
      <rect x="13" y="18" width="6" height="2"/>
      <rect x="12" y="20" width="8" height="1"/>
      <rect x="10" y="21" width="12" height="1"/>
      <rect x="8" y="22" width="16" height="1"/>
      <rect x="6" y="23" width="20" height="1"/>
      <rect x="4" y="24" width="24" height="1"/>
      <rect x="3" y="25" width="26" height="1"/>
      <rect x="2" y="26" width="28" height="1"/>
      <rect x="1" y="27" width="30" height="2"/>
      <rect x="0" y="29" width="32" height="3"/>
    </g>
    <g fill="#0B4527">
      <rect x="15" y="5" width="2" height="1"/>
      <rect x="14" y="6" width="4" height="2"/>
      <rect x="15" y="8" width="2" height="4"/>
      <rect x="14" y="12" width="4" height="1"/>
      <rect x="13" y="13" width="6" height="1"/>
    </g>
    <g fill="#E8B830" filter="url(#key-outline)">
      <rect x="18" y="8" width="12" height="3"/>
      <rect x="29" y="6" width="1" height="6"/>
      <rect x="34" y="6" width="1" height="6"/>
      <rect x="30" y="6" width="4" height="1"/>
      <rect x="30" y="11" width="4" height="1"/>
      <rect x="18" y="11" width="1" height="3"/>
      <rect x="20" y="11" width="1" height="3"/>
      <rect x="22" y="11" width="1" height="2"/>
    </g>
  </svg>

  <!-- Pixel-art wordmark: subtle shadow + clean main -->
  <g shape-rendering="crispEdges">
    <g transform="translate(219, 83) scale(13)">
      <use href="#wordmark" fill="#06311b"/>
    </g>
    <g transform="translate(216, 80) scale(13)">
      <use href="#wordmark" fill="#F5F9F4"/>
    </g>
  </g>

  <!-- Tagline: single line, terminal style -->
  <g font-family="'Courier New', 'IBM Plex Mono', monospace" font-size="20" font-weight="700">
    <text x="220" y="218" fill="#E8B830">&gt;</text>
    <text x="244" y="218" fill="#8FE0A0">long-term memory for you and your LLM</text>
  </g>

  <!-- Subtle overlays -->
  <rect width="900" height="280" rx="14" fill="url(#scanlines)"/>
  <rect x="8" y="8" width="884" height="264" rx="10" fill="none" stroke="#8FE0A0" stroke-width="2" opacity="0.45"/>
</svg>
