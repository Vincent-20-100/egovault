# ============================================================
# SYSTEM CONFIGURATION — versioned, ships with the app
# Modify carefully: changes here affect all users
# ============================================================

chunking:
  size: 800          # tokens per chunk
  overlap: 80        # sliding window (10% of size)

embedding:
  dims: 768              # dimension of embedding vectors — single source of truth
  provider: ollama       # embedding provider (ollama | openai)
  model: nomic-embed-text

llm:
  max_retries: 2     # Pydantic validation retries before human-in-the-loop
  large_format_threshold_tokens: 50000
                     # Sources exceeding this threshold are indexed for RAG
                     # but note generation is blocked. See large format policy in spec.
  context_window: null              # auto-detect if null
  direct_threshold_ratio: 0.6       # source > window * ratio → multi-pass

note_generation:
  strategy: auto                    # auto | direct | toc | map-reduce | web-search
  merge_chunk_size: 5000
  max_sub_notes: 40
  web_search_summary: false
  cache_intermediate: false

upload:
  max_audio_mb: 500  # max audio/video file size for ingest (MB)
  max_pdf_mb: 100    # max PDF file size for ingest (MB)
  max_text_chars: 500000   # ~125k words

web:
  extraction_tier: 0             # 0 = builtin (bs4), 1 = trafilatura
  max_response_mb: 10            # max HTTP response size
  timeout_seconds: 30            # fetch timeout
  min_fetch_interval_seconds: 2  # global rate limit between fetches
  max_redirects: 5               # max redirect chain length

# ============================================================
# TAXONOMY — user-configurable classification values
#
# IMPORTANT: These are opinionated defaults, NOT engine constraints.
# They reflect one user's workflow. Add, rename, or remove freely.
# The engine validates against this list — it never hardcodes enums.
# Challenge these values before adopting them for your own vault.
# Adding a new type = one line here, zero code change.
# ============================================================

taxonomy:
  note_types:
    - synthese        # distillation of an external source + personal view
    - concept         # transversal hub note linking multiple sources
    - reflexion       # personal thought, no external source
    - idee            # raw capture, undeveloped starting point

  source_types:
    - youtube
    - audio
    - video
    - pdf
    - livre           # same pipeline as pdf, different semantic context
    - texte           # raw text ingestion
    - web             # web page ingestion (single URL fetch + extract)
    - personnel       # no external source, personal reflection

  # ============================================================
  # GENERATION TEMPLATES — names of available prompt templates
  #
  # NOTE: note_type answers "what IS this note?" (content classification, editable).
  #       generation_template answers "how was this note MADE?" (process record).
  #       They can share similar names but are different things.
  #
  # Each name must correspond to a .yaml file in config/templates/generation/
  # Adding a template = one line here + one .yaml file. Zero code change.
  # ============================================================
  generation_templates:
    - standard        # default: balanced extraction, ships with the repo
    - merge           # internal: final synthesis of sub-notes for large sources
